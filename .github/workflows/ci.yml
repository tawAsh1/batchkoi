# CI: build, vet, test, gofmt on every push to main and every PR.
#
# Security: actions are pinned to full commit SHAs, the workflow gets
# read-only permissions, and checkout does not persist credentials.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

  # E2E for the bundled setup action (action.yml): installs the latest
  # release and runs the binary.
  action-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./
        with:
          version: latest

      - run: batchkoi version
